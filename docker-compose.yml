services:
  gaussian-splatting:
    # Compose is a runtime convenience path. Prefer docker buildx bake for
    # building the CUDA lane matrix and use this service to run the loaded image.
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PYTORCH_IMAGE: ${PYTORCH_IMAGE:-pytorch/pytorch:2.12.1-cuda13.0-cudnn9-devel}
        TORCH_CUDA_ARCH_LIST: ${TORCH_CUDA_ARCH_LIST:-8.6;8.9;12.0}
        MAX_JOBS: ${MAX_JOBS:-8}
    image: ${GS_IMAGE:-gaussian-splatting:pytorch-2.12.1-cu130}
    gpus: all
    shm_size: ${GS_SHM_SIZE:-16gb}
    working_dir: /workspace/project
    environment:
      GS_DATASETS: /workspace/datasets
      GS_RUNS: /workspace/runs
      GS_ARTIFACTS: /workspace/artifacts
      XDG_CACHE_HOME: /workspace/cache
      TORCH_HOME: /workspace/cache/torch
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      # Keep datasets, training outputs, artifacts, and model caches outside
      # the image so benchmark runs are reproducible across rebuilds.
      - ${GS_DATASETS_HOST:-./data}:/workspace/datasets
      - ${GS_RUNS_HOST:-./runs}:/workspace/runs
      - ${GS_ARTIFACTS_HOST:-./artifacts}:/workspace/artifacts
      - ${GS_CACHE_HOST:-./cache}:/workspace/cache
    command: bash
